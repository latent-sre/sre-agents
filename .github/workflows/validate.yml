name: Validate fleet

# The repo once documented its fleet validator as a "CI gate" while no CI existed -- the check only
# ran when someone remembered to run it, which is the same silent-failure mode a gate exists to catch.
# This is that gate.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    # The matrix is not ceremony. scripts/readonly-guard-hook.sh exists *because* the guard's earlier
    # inline form SILENTLY DISABLED ITSELF on Windows: `command -v python3` resolved to the Microsoft
    # Store stub, which is not an interpreter, so the hook ran nothing and every Bash call sailed
    # through unguarded. A Linux-only CI would never have seen it. Hence: run the guard's own tests on
    # all three OSes, and use `python` on Windows (GitHub's runner ships a real interpreter there;
    # `python3` is the Store stub).
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            py: python3
          - os: macos-latest
            py: python3
          - os: windows-latest
            py: python
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # PyYAML: the graders' layer-2 scenario tests load scenario files, and they FAIL (not skip)
      # without it. Gate A preflights this and refuses to run rather than half-running, but CI should
      # simply have the deps -- and PINNED, which is the point of the requirements file.
      - name: Install eval-harness deps
        run: ${{ matrix.py }} -m pip install -r requirements-dev.txt

      # ONE STEP, ONE SOURCE OF TRUTH. Gate A (scripts/gate_a.py) is the mechanical audit: fleet
      # structure, the validator's own tests, the read-only guard's 505 cases, the eval graders, and
      # the eval suite's parse check. It is what CI runs and what the spec's run protocol (Section 0)
      # tells a human or agent to run locally -- the same command, so the two cannot drift.
      #
      # This used to be six transcribed steps here and a SECOND transcription in the spec. They had
      # already disagreed (the spec's copy dropped the install step above, so a cold checkout died on
      # ModuleNotFoundError). The repo's own anti-rot doctrine says never transcribe an artifact that
      # lives in the repo -- point at it. This points at it.
      #
      # Gate A also fixes the interpreter war by not having an opinion: it re-invokes its sub-steps
      # under sys.executable, so `python` (Windows), `python3` (Linux/macOS), and `py -3` all do the
      # right thing. `python3` on Windows is the Microsoft Store stub -- not an interpreter -- which
      # is how the guard's earlier inline form SILENTLY DISABLED ITSELF, running nothing while every
      # Bash call sailed through unguarded. A Linux-only CI would never have seen it. Hence the matrix.
      - name: Gate A -- mechanical audit
        run: ${{ matrix.py }} scripts/gate_a.py
