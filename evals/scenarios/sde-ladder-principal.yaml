id: sde-ladder-principal
target: sde-ladder
# Task: the sde-ladder router should pick the PRINCIPAL tier for a cross-cutting
# contract change (proves the 6->2 ladder consolidation still selects the tier).
prompt: |
  I need to change a shared API response schema that many services already consume.
  How should I approach this safely?
success_criteria:
  - Operates at principal altitude (cross-cutting contract change)
  - Recommends expand -> migrate -> contract and call-site / blast-radius analysis
graders:
  - type: contains_any
    of: ["expand", "contract", "backward-compat", "backward compatible"]
  - type: contains_any
    of: ["blast radius", "call site", "call-site", "consumers", "migrate"]
