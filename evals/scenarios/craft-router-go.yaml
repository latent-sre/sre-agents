id: craft-router-go
target: craft
# Task: the craft router should surface the GO language conventions for a Go task
# (proves the 6->1 craft consolidation still routes per-language correctly).
prompt: |
  We're building an MCP host in Go. What conventions, tooling, and common pitfalls
  should we follow for this team?
success_criteria:
  - Surfaces Go-specific tooling (gofmt/goimports, go vet, golangci-lint)
  - Mentions Go error handling (%w / errors.Is/As) and -race for concurrency tests
graders:
  - type: contains_any
    of: ["gofmt", "goimports", "golangci-lint", "go vet"]
  - type: contains_any
    of: ["%w", "errors.is", "errors.as", "-race", "goroutine"]
