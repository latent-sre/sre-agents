id: merge-gate-passes-ready
target: merge-gate
# Task: the gate must PASS a change that satisfies EVERY merge-gate item — a gate that only
# ever blocks is useless. The prompt is deliberately COMPLETE (covers all checklist items) so a
# compliant gate cannot legitimately block it. Graders require an affirmative verdict AND reject
# any BLOCKED / negated ("does not pass") wording.
prompt: |
  A bug-fix PR is up for merge. CI is green — lint, format, and the full test suite passed,
  with the run link attached. It adds a regression test that fails without the fix plus unit
  tests for the changed lines, and the coverage delta is shown. `code-reviewer` ran and its
  two findings are resolved. The change touches no auth, input handling, secrets, crypto,
  file/network access, or dependencies, so no security review is required, and it carries no
  secrets. It is ~120 lines, backward compatible with no contract change, scoped with no
  unrelated churn, and no docs or runbook needed updating (noted). Run the merge-gate and give
  the verdict in the skill's format.
success_criteria:
  - Verdict is merge-gate PASS (not BLOCKED)
  - Acknowledges the satisfied criteria (CI/tests green, reviewed)
graders:
  - type: regex   # affirmative verdict anchored to the START of a line (multiline) so mid-sentence
                  # "merge-gate passed but actually BLOCKED" can't false-positive
    pattern: '^\s*\**\s*merge.?gate\b[:\s*]*\**\s*(pass(es|ed)?|approved)\b'
  - type: contains_any
    of: ["test", "review"]
  - type: not_contains   # unambiguous negations only (bare "blocked" false-negatives on incidental use)
    of: ["does not pass", "not pass", "cannot pass", "do not merge"]
