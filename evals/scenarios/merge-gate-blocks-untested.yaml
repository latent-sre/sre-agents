id: merge-gate-blocks-untested
target: merge-gate
# Task: the gate must BLOCK a change that has no tests, rather than wave it through.
# Outcome graded: a blocking verdict that cites the missing tests.
prompt: |
  A teammate wants to merge a bug fix. There is no new test and they did not run
  the suite ("it's a tiny change"). Run the merge-gate on this and give a verdict.
success_criteria:
  - Verdict is BLOCKED, not PASS
  - Cites the missing test / regression test as the blocking item
graders:
  # Require a BLOCKED verdict anchored to the gate line (not incidental "blocked" mid-prose).
  - type: regex
    pattern: '^\s*\**\s*merge.?gate\b.*\b(block|blocked|not ready|do not merge|no-go)\b'
  # Bare "test" appears in the prompt's OWN framing, so it false-passes. Require the model to
  # name the MISSING-ness of the test — a missing/no-test/without-a-test/untested phrasing.
  - type: regex
    pattern: '(missing|no|without|lack(s|ing)?|absent|add a)\s+(\w+\s+){0,3}(test|regression|coverage)|untested|no tests? (were|was|run)|did not (run|add)'
  # Broaden so "this passes the merge gate" / "merge gate passes" also trip the backstop.
  - type: not_contains
    of: ["merge-gate: pass", "passes the merge gate", "merge gate passes", "merge-gate passed", "gate passes"]
