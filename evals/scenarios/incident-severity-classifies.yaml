id: incident-severity-classifies
target: incident-severity
# Task: given a described impact, the skill must produce a CORRECT severity classification and the
# matching comms cadence. The scenario describes a customer-facing outage for most users (the SEV1
# row: all/most users down) — grade that it lands SEV1 (over-classify, round up) and names the
# 15-minute update cadence that SEV1 triggers.
prompt: |
  The checkout service is returning 5xx for essentially all users — nobody can complete a purchase,
  and it's been down for ~6 minutes with no sign of recovery. Classify this incident's severity and
  tell me the communications cadence and what it triggers.
success_criteria:
  - Classifies as SEV1 (customer-facing outage for all/most users); rounds up under uncertainty
  - States the SEV1 comms cadence (status updates every 15 min) and that an incident commander is assigned
graders:
  - type: regex   # severity token anchored — SEV1 / SEV-1 / SEV 1
    pattern: '\bsev[\s-]?1\b'
  - type: contains_any
    of: ["15 min", "15 minute", "every 15", "fifteen min"]
  - type: contains_any
    of: ["incident commander", "declare", "page", "on-call", "postmortem"]
  # Must not CLASSIFY this all-users outage as a lower severity. Gated so a CONTRASTING mention
  # ("SEV1, not SEV3/SEV4", "more severe than SEV3") does not false-fail, while an actual lower-sev
  # CONCLUSION does — including verdicts with no "this is" lead-in ("should be SEV3", "= SEV4",
  # "downgrade to SEV3"). Exemptions (not / than / above) bind via lookbehind.
  # (graders apply re.IGNORECASE, so lowercase lead-ins match "Severity:" / "This is" etc.)
  - type: not_regex
    pattern: '(?<!not )(?<!not a )(?<!than )(?<!above )(?<!above a )(severity[:=\s]+|classif\w+(?: it| this)? as (?:an? )?|this (?:is|should be|would be|is now)(?: an?)? |should be (?:an? )?|downgrade(?:d)? to (?:an? )?|=\s*|→\s*)sev[\s-]?[34]\b'
