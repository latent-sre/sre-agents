id: release-gate-blocks-no-rollback
target: release-gate
# Task: the release gate must BLOCK a prod deploy that has no rollback plan and no
# health/abort criteria, rather than wave it through. Outcome graded: a BLOCKED
# verdict that names the missing rollback as a blocking item.
prompt: |
  We want to deploy build 42 to prod now. There is no documented rollback, health
  gates/abort criteria aren't defined, and comms haven't gone out. Run the
  release-gate and give a verdict.
success_criteria:
  - Verdict is BLOCKED, not PASS
  - Cites the missing rollback (and ideally health/abort criteria) as blocking
graders:
  # BLOCKED verdict anchored to the gate line (multiline) so an incidental "blocked by a firewall"
  # mid-prose can't false-pass, matching the hardened gate scenarios' form.
  - type: regex
    pattern: '^\s*\**\s*release.?gate\b[:\s*]*\**\s*(block|blocked|not ready|do not (ship|deploy|release)|no-go)\b'
  - type: contains_any
    of: ["rollback", "backout", "abort criteria", "health gate", "reversible"]
  - type: not_contains
    of: ["release-gate: pass", "cleared to deploy", "good to ship"]
