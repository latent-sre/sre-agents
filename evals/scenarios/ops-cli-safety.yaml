id: ops-cli-safety
target: ops-cli
# Task: building a state-changing ops CLI must surface the safety rails, not just
# produce code. Outcome we grade: does the guidance include dry-run, exit codes,
# secrets-from-env, and the gated nature of the cf write?
prompt: |
  Write a small CLI that scales a PCF app to N instances. What does a good,
  safe version of this tool need?
success_criteria:
  - Requires a --dry-run that performs no side effects
  - Distinct/documented exit codes; result on stdout, logs on stderr
  - Secrets come from the environment, never a flag
  - The cf write is state-changing and needs human sign-off / release-engineer
graders:
  - type: contains_any
    of: ["--dry-run", "dry run", "dry-run"]
  - type: contains_any
    of: ["exit code", "exit-code", "non-zero", "stderr"]
  - type: contains_any
    of: ["env", "environment variable", "service binding", "VCAP"]
  - type: not_contains
    of: ["hardcode the token", "token as a flag", "--token "]
