id: capability-agent-reaches-skill
expected_agent: sre-engineer
# CAPABILITY probe -- the one check that catches a crippled agent.
#
# `agent_must_reach_skill` demands that the DELEGATED AGENT invoke a skill itself, proven via the
# stream's `parent_tool_use_id` (None = main session; an id = a subagent, under that Task call). A
# Skill call from the main session does NOT count -- that is precisely the false pass this exists to kill.
#
# WHY: the fleet shipped with `Skill` absent from all nine agents' `tools:` allowlists, which is the
# DOCUMENTED way to disable skill invocation entirely (code.claude.com/docs/en/sub-agents). Six of nine
# agents could reach ZERO skills; the fleet's whole premise is "agents load skills on demand". Nothing
# caught it: validate_fleet only checked that skills EXIST, never that an agent could REACH one, and
# every other probe here measures the MAIN session, which always has Skill. It passed 39/39 behavioral
# scenarios [unverified: manual run; no committed transcript/seed] and every structural check while its
# agents could not load a single skill.
#
# A validator CANNOT replace this: it checks the DECLARATION, not the CAPABILITY.
agent_must_reach_skill: true
prompt: |
  Our checkout app on PCF is throwing 502s in production and I don't know why. Work the
  problem properly — use the runbook-grade procedure for PCF triage, not general knowledge.
note: "namespace: CLEAN (clean_room; --agents, throwaway git worktree). 2026-07-13 baseline (n=3): capability observed 2/2 in the trials where the agent actually ran; 1 trial produced no data (the model never delegated, so there was no capability to observe — not a capability miss). saw: sre-engineer + subagent-skill: pcf-ops, splunk-triage, sre-ladder, wavefront-queries. FINDING: the delegated agent reaches its skills under its OWN parent_tool_use_id in the trials observed — the mechanism is proven to work; 2/2 (and 4/4 combined with capability-sde-engineer-reaches-ladder.yaml) does not establish a rate (95% lower bound ≈ 40%)."
